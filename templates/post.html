{% extends "base.html" %}
{% block title %}{{ card.title }}{% endblock %}
{% block content %}
<h1>{{ card.title }}</h1>

<img src="{{ card.image }}" alt="" style="max-width: 100%;">

<p><strong>Категория:</strong>
    <a href="{{ url_for('category_filter', category_slug=card.category_slug) }}">
        {{ card.category }}
    </a>
</p>

<p><strong>Технологии:</strong> {{ card.tech1 }}, {{ card.tech2 }}</p>
<p><strong>Год:</strong> {{ card.year }}</p>

<a href="{{ url_for('index') }}#portfolio">← Назад</a>
{% endblock content %}
